    \  t:\n    symbol: t\n    description: Pressure design thickness\n    unit: mm\n\
    \  D:\n    symbol: D\n    description: Outside diameter of pipe\n    unit: mm\n\
    \  Y:\n    symbol: Y\n    description: Coefficient from Table 304.1.1\n    unit:\
    \ dimensionless\n\nsteps:\n  - name: compute_denominator\n    description: Calculate\
    \ D - 2Yt\n    expressions:\n      - expression: \"D - 2 * Y * t\"\n        assign:\
    \ denominator\n\n  - name: compute_mawp\n    description: Calculate Maximum Allowable\
    \ Working Pressure\n    expressions:\n      - expression: \"2 * S * E * W * t\
    \ / denominator\"\n        assign: MAWP\n\noutputs:\n  - symbol: MAWP\n    name:\
    \ mawp\n    unit: Pa\n    type: quantity\n\nexecutor: calculate_mawp\n---\n\n\
    # Maximum Allowable Working Pressure\n\n## Human-readable equation\n\n```\nMAWP\
    \ = 2SEWt / (D - 2Yt)\n```\n\nRearrangement of the thin-wall internal pressure\
    \ equation per §304.1.2 when\npressure design thickness `t` is known.\n\nWhere\
    \ symbols are defined in §304.1.1(b):\n\n| Symbol | Meaning |\n|--------|---------|\n\
    | `MAWP` | Maximum Allowable Working Pressure |\n| `S` | Stress value from Table\
    \ A-1 |\n| `E` | Quality factor from Tables A-1A and A-1B |\n| `W` | Weld strength\
    \ reduction factor per para. 302.3.5(e) |\n| `t` | Pressure design thickness |\n\
    | `D` | Outside diameter of pipe |\n| `Y` | Coefficient from Table 304.1.1 |\n\
    \n## Execution notes\n\n- Inputs must be in SI units (`Pa`, `mm`) at execution\
    \ time.\n- Result `MAWP` is in `Pa`.\n"
- id: thick_wall_y
  type: equation
  source: "---\nid: thick_wall_y\ntitle: Thick-Wall Temperature Coefficient Y\nequation:\
    \ \"Y = (d + 2c) / (D + d + 2c)\"\nsymbols:\n  - symbol: Y\n    description: Temperature\
    \ coefficient for thick-wall pipe (t >= D/6)\n  - symbol: d\n    description:\
    \ Inside diameter per §304.1.1(b)\n  - symbol: D\n    description: Outside diameter\n\
    \  - symbol: c\n    description: Sum of mechanical, corrosion, and erosion allowances\n\
    ---\n\n# Thick-Wall Coefficient Y\n\nWhen **t ≥ D/6**, the coefficient **Y** is\
    \ computed per §304.1.1(b):\n\n```\nY = (d + 2c) / (D + d + 2c)\n```\n\nWhere\
    \ **d** is the inside diameter (maximum value allowable under the purchase specification).\n"
- id: B313-eq-wall-thickness
  type: equation
  source: "---\nequation_id: wall_thickness\nname: Internal Pressure Wall Thickness\n\
    display: \"t = PD / 2(SEW + PY)\"\nnomenclature_ref: B313-304.1.1\n\nvariables:\n\
    \  P:\n    symbol: P\n    description: Internal design gage pressure\n    unit:\
    \ Pa\n  D:\n    symbol: D\n    description: Outside diameter of pipe\n    unit:\
    \ mm\n  S:\n    symbol: S\n    description: Stress value from Table A-1\n    unit:\
    \ Pa\n  E:\n    symbol: E\n    description: Quality factor from Tables A-1A and\
    \ A-1B\n    unit: dimensionless\n  W:\n    symbol: W\n    description: Weld strength\
    \ reduction factor per para. 302.3.5(e)\n    unit: dimensionless\n  Y:\n    symbol:\
    \ Y\n    description: Coefficient from Table 304.1.1\n    unit: dimensionless\n\
    \nsteps:\n  - name: compute_denominator_terms\n    description: Calculate SEW\
    \ and PY terms\n    expressions:\n      - expression: \"S * E * W\"\n        assign:\
    \ SEW\n      - expression: \"P * Y\"\n        assign: PY\n\n  - name: compute_required_thickness\n\
    \    description: Calculate pressure design wall thickness\n    expressions:\n\
    \      - expression: \"P * D / (2 * (SEW + PY))\"\n        assign: t\n\noutputs:\n\
    \  - symbol: t\n    name: required_thickness\n    unit: mm\n    type: quantity\n\
    \nexecutor: calculate_wall_thickness\n---\n\n# Internal Pressure Wall Thickness\n\
    \n## Human-readable equation\n\n```\nt = PD / 2(SEW + PY)\n```\n\nWhere symbols\
    \ are defined in §304.1.1(b):\n\n| Symbol | Meaning |\n|--------|---------|\n\
    | `t` | Pressure design thickness |\n| `P` | Internal design gage pressure |\n\
    | `D` | Outside diameter of pipe |\n| `S` | Stress value from Table A-1 |\n| `E`\
    \ | Quality factor from Tables A-1A and A-1B |\n| `W` | Weld strength reduction\
    \ factor per para. 302.3.5(e) |\n| `Y` | Coefficient from Table 304.1.1 |\n\n\
    ## Execution notes\n\n- Inputs must be in SI units (`Pa`, `mm`) at execution time.\n\
    - Result `t` is in `mm`.\n- Intermediate values `SEW` and `PY` must be retained\
    \ in the execution trace without rounding.\n- Combine `t` with allowances `c`\
    \ per §304.1.1 eq. (2) to obtain `t_m`.\n"
