---
id: WF-MAWP
type: workflow
key: mawp_design
name: Maximum Allowable Working Pressure (MAWP)
workflow_class: design_calculation
description: Calculate the maximum allowable working pressure of piping components
  per ASME B31.3.
domain:
- piping
expected_authorities:
- AUTH-ASME-B31.3
- AUTH-ASME-B36.10M
entry_points:
- parameter: PARAM-maximum-allowable-working-pressure
  role: definition_anchor
expected_parameters:
- PARAM-straight-pipe-section
- PARAM-wall-thickness-basis
- PARAM-geometry-input-mode
- PARAM-nominal-pipe-size
- PARAM-pipe-schedule
- PARAM-outside-diameter
- PARAM-actual-wall-thickness
- PARAM-corrosion-allowance
- PARAM-material-grade
- PARAM-metallurgical-group
- PARAM-design-temperature
- PARAM-pipe-construction-type
- PARAM-basic-quality-factors-for-longitudinal-weld-joints-in-pipes-and-tubes
- PARAM-weld-strength-reduction-factor-W
- PARAM-temperature-coefficient-Y
- PARAM-allowable-stress
- PARAM-maximum-allowable-working-pressure
goal_expansion:
  root_goal:
    goal_class: calculation_goal
    target_parameter: PARAM-maximum-allowable-working-pressure
phases:
- key: expansion_assumptions
  purpose: Confirm assumptions required before graph expansion.
  required_parameters:
  - PARAM-straight-pipe-section
- key: path_decisions
  purpose: Select geometry input mode and wall thickness basis.
  required_parameters:
  - PARAM-geometry-input-mode
  - PARAM-wall-thickness-basis
- key: parameter_gathering
  purpose: Collect geometry and material inputs.
  required_parameters:
  - PARAM-nominal-pipe-size
  - PARAM-pipe-schedule
  - PARAM-outside-diameter
  - PARAM-actual-wall-thickness
  - PARAM-corrosion-allowance
  - PARAM-material-grade
  - PARAM-design-temperature
- key: coefficient_resolution
  purpose: Resolve coefficients required by the MAWP equation.
  required_parameters:
  - PARAM-pipe-construction-type
  - PARAM-basic-quality-factors-for-longitudinal-weld-joints-in-pipes-and-tubes
  - PARAM-weld-strength-reduction-factor-W
- key: execution_assumptions
  purpose: Resolve execution assumptions.
  required_parameters: []
- key: definition_equation_completion
  purpose: Complete definition and equation inputs.
  required_parameters: []
runtime:
  navigation:
    assumption_gate_fields:
    - straight_pipe_section
    - geometry_input_mode
    - wall_thickness_basis
    phases:
      expansion_assumptions:
      - straight_pipe_section
      path_decisions:
      - geometry_input_mode
      - wall_thickness_basis
      parameter_gathering:
      - nominal_pipe_size
      - pipe_schedule
      - outside_diameter
      - actual_wall_thickness
      - corrosion_allowance
      - material_grade
      - design_temperature
      coefficient_resolution:
      - pipe_construction_type
      execution_assumptions: []
      definition_equation_completion: []
  assumptions:
  - id: pressure_loading
    field: pressure_loading
    description: MAWP applies to straight pipe under internal pressure per §304.1.2.
    required_for_expansion: true
    allowed_values:
    - internal_pressure
    default: internal_pressure
  provisional_assumptions:
  - field: thin_wall
    default: true
    description: Assume t < D/6 until thickness is verified.
  - field: pressure_loading
    default: internal_pressure
    description: MAWP applies to internal pressure loading per §304.1.2.
  interactions:
  - variable: geometry_input_mode
    mode: decision
    required: true
    required_for_expansion: true
    options:
    - nps_and_schedule
    - direct_od_and_thickness
    question: >
      How should pipe geometry be provided for this MAWP calculation?
  inputs:
  - id: pressure_design_thickness
    name: t
    description: Pressure design thickness from prior calculation
    required: true
    source: node_output
    unit: mm
  - id: outside_diameter
    name: D
    description: Outside diameter of pipe
    nomenclature_ref: WF-MAWP
    required: true
    source: user_input
    unit: mm
    allowed_units:
    - mm
    - in
    validation: positive
  - id: allowable_stress
    name: S
    description: Allowable stress from Table A-1
    required: true
    source: node_output
    unit: Pa
  - id: basic_quality_factors_for_longitudinal_weld_joints_in_pipes_and_tubes
    name: E
    description: Quality factor from Tables A-2 and A-3
    required: true
    source: node_output
    unit: dimensionless
  - id: weld_joint_strength_reduction_factor_W
    name: W
    description: Weld strength reduction factor from Table 302.3.5-1
    required: true
    source: node_output
    unit: dimensionless
  - id: temperature_coefficient_Y
    name: Y
    description: Coefficient from Table 304.1.1-1 (resolved from design temperature and metallurgical group)
    required: true
    source: node_output
    unit: dimensionless
  equations:
  - id: asme-b313-pressure-design-thickness
    file: ../equation/asme-b313-pressure-design-thickness.yaml
    execution_function: calculate_pressure_design_thickness
  - id: asme-b313-mawp-pressure
    file: ../equation/asme-b313-mawp-pressure.yaml
    execution_function: calculate_mawp
  conditions:
  - id: thin_wall_check
    name: thin_wall_check
    expression: t < D/6
    description: Verify thin-wall equation applicability
    sets_field: thin_wall
    on_false: subsection_b
    result_if_true: Continue with thin-wall MAWP calculation
    result_if_false: Thick-wall MAWP not yet implemented
  nomenclature:
  - symbol: t_actual
    input_id: actual_wall_thickness
    introduced_here: true
    description: Actual or ordered wall thickness of the pipe.
    unit: mm
    allowed_units:
    - mm
    - in
    citations:
    - standard: asme_b36.10
      table: tables/B3610-table-2-1.yaml
      field: wall_thickness_mm
  - symbol: c
    input_id: corrosion_allowance
    introduced_here: true
    unit: mm
    allowed_units:
    - mm
    - in
    description: Sum of mechanical allowances plus corrosion and erosion allowances per §304.1.1-b.
  - symbol: t
    description: Pressure design thickness (t_actual minus corrosion allowance).
    citations:
    - paragraph: 304.1.1-b
    - node_id: asme-b313-mawp-pressure
  - symbol: D
    input_id: outside_diameter
    introduced_here: true
    description: Outside diameter of pipe as listed in standards or as measured.
    unit: mm
    allowed_units:
    - mm
    - in
    citations:
    - standard: asme_b36.10
  - symbol: S
    input_id: allowable_stress
    introduced_here: true
    description: Stress value from Table A-1.
    citations:
    - node_id: asme-b313-table-A-1
  - symbol: E
    input_id: basic_quality_factors_for_longitudinal_weld_joints_in_pipes_and_tubes
    introduced_here: true
    description: Quality factor from Tables A-2 and A-3.
  - symbol: W
    input_id: weld_joint_strength_reduction_factor_W
    introduced_here: true
    description: Weld strength reduction factor per para. 302.3.5-e.
  - symbol: Y
    input_id: temperature_coefficient_Y
    introduced_here: true
    description: Coefficient from Table 304.1.1 when t < D/6.
  - symbol: MAWP
    description: Maximum Allowable Working Pressure.
    citations:
    - paragraph: 304.1.2-a
    - node_id: asme-b313-mawp-pressure
  texts:
  - id: mawp-init-text
    type: text
    role: initiation
    title: This workflow guides you through calculating the Maximum Allowable Working Pressure (MAWP) of piping components according to ASME B31.3.
    text: Define inputs, assumptions, and nomenclature for MAWP calculation of straight pipe under internal pressure per §304.1.2.
  - id: mawp-result-text
    type: text
    role: result_explanation
    text: Maximum Allowable Working Pressure (MAWP) has been calculated per §304.1.2.
  suggested_workflows:
  - pipe_wall_thickness_design
  goal_output: mawp
  engineering_intent: mawp_design
  slug: mawp_design
applicability:
  applies_to:
  - CONCEPT-pipe
  - CONCEPT-pressure
  - CONCEPT-mawp
report:
  report_type: calculation_report
  required_sections:
  - objective
  - authority_context
  - inputs
  - equations
  - calculations
  - validation
  - warnings
  - conclusion
edges:
- type: requires_parameter
  target: PARAM-wall-thickness-basis
- type: depends_on
  target: asme-b313-table-A-1
- type: may_use_lookup
  target: asme-b313-table-A-1
- type: may_use_lookup
  target: asme-b313-table-A-2
- type: may_use_lookup
  target: asme-b313-table-A-3
- type: may_use_lookup
  target: asme-b313-table-304-1-1-1
- type: may_use_lookup
  target: asme-b313-table-302-3-5-1
- type: starts_from_parameter
  target: PARAM-maximum-allowable-working-pressure
- type: may_use_equation
  target: asme-b313-pressure-design-thickness
- type: may_use_equation
  target: asme-b313-mawp-pressure
- type: may_use_validation_rule
  target: asme-b313-304-1-2-valrule-a
metadata:
  status: active
  version: 1
  last_revision: 2026-07-07
  edited_by: admin
---
