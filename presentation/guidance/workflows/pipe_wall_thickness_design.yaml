# Flow Guidance Layer — traversal narration only (presentation data, not engineering truth).
# Must not duplicate parameter prompt copy or equation/formula bodies.
# Reference node_id / equation_id in refs only.

workflow_id: pipe_wall_thickness_design

entries:
  - id: pressure-loading-branch
    match:
      current_phase: path_decisions
      traversal_event: branch_decision_required
      edge_reason: pressure_design_case
    text: >-
      The workflow is selecting the internal versus external pressure branch.
      Internal pressure design uses paragraph 304.1.2; external pressure design
      uses paragraph 304.1.3. The active governing equation depends on this
      decision.
    refs:
      node_id: "304.1.2-a"
      equation_id: asme-b313-304-1-2-eq-3a

  - id: input-context-internal-pressure
    match:
      current_phase: parameter_gathering
      edge_reason: internal_design_gage_pressure
    text: >-
      Internal design gage pressure is collected for the governing thickness
      equation on the selected internal-pressure branch. It combines with
      allowable stress and geometry inputs to determine required thickness.
    refs:
      equation_id: asme-b313-304-1-2-eq-3a

  - id: input-context-design-temperature
    match:
      current_phase: parameter_gathering
      edge_reason: design_temperature
    text: >-
      Design temperature is used with the selected material to resolve allowable
      stress from the applicable material table on the active branch.
    refs:
      equation_id: asme-b313-304-1-2-eq-3a

  - id: input-context-material-grade
    match:
      current_phase: parameter_gathering
      edge_reason: material_grade
    text: >-
      Material specification and grade are used with design temperature to
      resolve allowable stress from the applicable material table.
    refs:
      equation_id: asme-b313-304-1-2-eq-3a

  - id: parameter-gathering-entry
    match:
      current_phase: parameter_gathering
      active_node_id: "304.1.2-a"
      node_role: equation
      traversal_event: node_selected
    text: >-
      Design parameters for the selected branch will be collected next. Values
      feed the governing thickness equation on the active path.
    refs:
      equation_id: asme-b313-304-1-2-eq-3a
