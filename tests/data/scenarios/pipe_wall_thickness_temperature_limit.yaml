name: pipe_wall_thickness_temperature_limit
description: Temperature exceeding material table range fails validation

given:
  inputs:
    design_pressure: { value: 500, unit: psi }
    outside_diameter: { value: 10, unit: in }
    material: { value: SA-106B, unit: dimensionless }
    design_temperature: { value: 900, unit: F }

when:
  user_request: Calculate pipe wall thickness
  intent:
    intent: pipe_wall_thickness_design
    domain: piping
    workflow: pipe_wall_thickness_design
    confidence: 0.95

expected:
  validation:
    plan_status: fail
    error_rules_contains:
      - temperature_table_bounds

  execution:
    status: error

  state:
    status: invalidated
