name: pipe_wall_thickness_material_conflict
description: Material change records conflict and allows recalculation

given:
  inputs:
    pressure_loading: { value: internal_pressure, unit: dimensionless }
    straight_pipe_section: { value: true, unit: dimensionless }
    joint_category: { value: seamless, unit: dimensionless }
    corrosion_allowance: { value: 0.5, unit: mm }
    weld_joint_efficiency: { value: 1.0, unit: dimensionless }
    weld_strength_reduction: { value: 1.0, unit: dimensionless }
    temperature_coefficient: { value: 0.4, unit: dimensionless }
    design_pressure: { value: 500, unit: psi }
    d_input_mode: { value: direct_od, unit: dimensionless }
    outside_diameter: { value: 10, unit: in }
    material: { value: SA-106B, unit: dimensionless }
    design_temperature: { value: 200, unit: F }

when:
  user_request: Calculate pipe wall thickness
  intent:
    intent: pipe_wall_thickness_design
    domain: piping
    workflow: pipe_wall_thickness_design
    confidence: 0.95

steps:
  - action: execute
    expect:
      execution:
        status: completed

  - action: update_input
    inputs:
      material: { value: A106-B, unit: dimensionless }

  - action: execute
    expect:
      state:
        conflicts_contains:
          input_id: material
          previous_value: SA-106B
          new_value: A106-B
      execution:
        status: completed

expected:
  execution:
    status: completed
