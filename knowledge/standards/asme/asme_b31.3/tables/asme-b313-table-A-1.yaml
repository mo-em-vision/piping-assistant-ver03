table_id: asme-b313-table-A-1
lookup_rules:
  by_material_temperature:
    strategy: material_temperature
    row_resolution:
      design_temperature:
        breakpoint_column: design_temperature
        unit: degF
        method: linear_interpolation
        outside_range: error
        duplicate_breakpoints: error
        missing_value: error
        interpolate_columns:
          - allowable_stress
    inputs:
      material_grade:
        resolver: material_catalog
      design_temperature:
        resolver: identity
        column: design_temperature
        parameter: PARAM-design-temperature
    outputs:
      allowable_stress:
        column: allowable_stress
        parameter: PARAM-allowable-stress
    on_no_match:
      action: error
    on_multiple_matches:
      action: error
