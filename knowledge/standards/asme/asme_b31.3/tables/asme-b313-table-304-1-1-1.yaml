table_id: asme-b313-table-304-1-1-1
lookup_rules:
  by_material_group_temperature:
    strategy: material_group_temperature
    row_resolution:
      design_temperature:
        breakpoint_column: design_temperature
        unit: degF
        method: linear_interpolation
        outside_range: clamp_to_boundary
        duplicate_breakpoints: error
        missing_value: error
        min: 900
        max: 1250
        interpolate_columns:
          - coefficient_Y
    inputs:
      metallurgical_group:
        resolver: metallurgical_group_key
      design_temperature:
        resolver: identity
        column: design_temperature
        parameter: PARAM-design-temperature
    outputs:
      temperature_coefficient_Y:
        column: coefficient_Y
        parameter: PARAM-temperature-coefficient-y
    on_no_match:
      action: error
    on_multiple_matches:
      action: error
