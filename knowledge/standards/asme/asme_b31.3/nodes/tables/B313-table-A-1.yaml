# Basic Allowable Stresses in Tension for Metals



> **Development sample — not verbatim ASME B31.3 table data.**



Deterministic lookup for allowable stress **S** at metal temperature for the selected material. Data is stored in `asme_b313_tables.db` (`table_id: asme_b31.3_A-1`).



## Output



Allowable stress **S** (declared in MPa via `DIM-pressure`; stored in Pa in the standards tables database), passed to dependent calculation nodes (e.g. §304.1.1, §304.1.2).
