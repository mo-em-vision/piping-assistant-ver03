# Table A-2 — Basic Casting Quality Factors, E_c

These quality factors are determined in accordance with [para. 302.3.3(b)](node:302.3.3/b). See also [para. 302.3.3(c)](node:302.3.3/c) and [Table 302.3.3C](table:asme_b31.3_table_302_3_3C) for increased quality factors applicable in special cases. Specifications are ASTM.

Lookup for basic casting quality factor **E_c** by `base_metal_group` and material. Data is stored in `asme_b313_tables.db` (`table_id: asme_b31.3_A-2`).
