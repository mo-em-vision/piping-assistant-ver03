---
id: asme-b313-304-1-2-valrule-b
type: validation_rule
key: asme-b313-304-1-2-valrule-b
name: Thick-Wall Special Consideration Required
rule_class: validation
description: >
  When t >= D/6 or P/(SE) > 0.385, pressure design thickness for straight pipe
  requires special consideration of theory of failure, fatigue, and thermal stress.
authority:
  authorized_by:
  - 304.1.2-b
  authority_context_required: true
display:
  text: t >= D/6 OR P/(SE) > 0.385
expression:
  language: sympy
  formula: thick_wall_special_consideration_required = (t >= D/6) or (P / (S * E) > 0.385)
requires:
- symbol: t
  required: true
  description: Pressure design thickness
  parameter: PARAM-required-wall-thickness
- symbol: D
  required: true
  description: Outside diameter of pipe
  parameter: PARAM-outside-diameter
- symbol: P
  required: true
  description: Internal design gage pressure
  parameter: PARAM-internal-design-gage-pressure
- symbol: S
  required: true
  description: Stress value from Table A-1
  parameter: PARAM-allowable-stress
- symbol: E
  required: true
  description: Quality factor from Tables A-2 and A-3
  parameter: PARAM-weld-joint-efficiency
validates:
- symbol: thick_wall_special_consideration_required
  parameter: PARAM-thick-wall-special-consideration-required
conditions:
  any_of:
  - expression: t >= D/6
    description: Thick-wall geometry limit per §304.1.2(b)
  - expression: P / (S * E) > 0.385
    description: High pressure-to-strength ratio per §304.1.2(b)
on_fail:
  severity: warning
  blocks_goal: false
  message: >
    Thick-wall special consideration may be required per §304.1.2(b).
applicability:
  applies_when:
  - parameter: PARAM-internal-design-gage-pressure
    operator: present
edges:
- type: requires_parameter
  target: PARAM-required-wall-thickness
  alias: t
- type: requires_parameter
  target: PARAM-outside-diameter
  alias: D
- type: requires_parameter
  target: PARAM-internal-design-gage-pressure
  alias: P
- type: requires_parameter
  target: PARAM-allowable-stress
  alias: S
- type: requires_parameter
  target: PARAM-weld-joint-efficiency
  alias: E
- type: validates_parameter
  target: PARAM-thick-wall-special-consideration-required
- type: constrains_equation
  target: asme-b313-304-1-2-eq-3a
- type: constrains_equation
  target: asme-b313-304-1-2-eq-3b
execution:
  variables:
    t:
      symbol: t
      parameter: PARAM-required-wall-thickness
      description: Pressure design thickness
      unit: mm
    D:
      symbol: D
      parameter: PARAM-outside-diameter
      description: Outside diameter of pipe
      unit: mm
    P:
      symbol: P
      parameter: PARAM-internal-design-gage-pressure
      description: Internal design gage pressure
      unit: Pa
    S:
      symbol: S
      parameter: PARAM-allowable-stress
      description: Stress value from Table A-1
      unit: Pa
    E:
      symbol: E
      parameter: PARAM-weld-joint-efficiency
      description: Quality factor from Tables A-2 and A-3
      unit: dimensionless
  outputs:
  - symbol: thick_wall_special_consideration_required
    name: thick_wall_special_consideration_required
    unit: dimensionless
    type: boolean
  equation_id: valrule-304-1-2-b
  nomenclature_ref: 304.1.1-b
  steps:
  - name: evaluate_thick_wall_conditions
    description: Check §304.1.2(b) applicability limits
    expressions:
    - expression: t >= D / 6
      assign: thick_wall_by_geometry
    - expression: P / (S * E) > 0.385
      assign: thick_wall_by_pressure_ratio
    - expression: thick_wall_by_geometry or thick_wall_by_pressure_ratio
