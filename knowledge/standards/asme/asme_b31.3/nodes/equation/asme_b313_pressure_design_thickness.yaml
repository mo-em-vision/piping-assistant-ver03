# Pressure Design Thickness

## Human-readable equation

```
t = t_actual - c
```

Where:

| Symbol | Meaning |
|--------|---------|
| `t` | Pressure design thickness |
| `t_actual` | Actual or ordered wall thickness |
| `c` | Corrosion allowance |

## Execution notes

- Inputs must be in SI units (`mm`) at execution time.
- Result `t` is in `mm`.
