variables:
  f:
    symbol: f
    description: Stress range factor from eq. (1c)
    unit: dimensionless
  S_c:
    symbol: S_c
    description: Basic allowable stress at minimum metal temperature during displacement
      cycle analysis
    unit: Pa
  S_h:
    symbol: S_h
    description: Basic allowable stress at maximum metal temperature during displacement
      cycle analysis
    unit: Pa
  S_L:
    symbol: S_L
    description: Stress due to sustained loads
    unit: Pa
executor: calculate_allowable_displacement_stress_range_with_margin
calculation_module: eq_1b_allowable_displacement_stress_range_with_margin.py
outputs:
- symbol: S_A
  name: allowable_displacement_stress_range
  unit: Pa
  type: quantity
equation_id: eq-1b
display: S_A = f * (1.25*(S_c + S_h) - S_L)
applies_when: S_h > S_L and the difference is added to 0.25*S_h
paragraph: 302.3.5-d
