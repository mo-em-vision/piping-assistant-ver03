# Eq. (1b) — Allowable Displacement Stress Range with Sustained Stress Margin

```
S_A = f * (1.25*(S_c + S_h) - S_L)
```

Use when `S_h > S_L` and the difference between them is added to the `0.25*S_h`
term in eq. (1a).
