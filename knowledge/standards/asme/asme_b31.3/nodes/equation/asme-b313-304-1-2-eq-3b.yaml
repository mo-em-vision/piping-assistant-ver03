  target: PARAM-internal-design-gage-pressure
  alias: P
- type: requires_parameter
  target: PARAM-inside-diameter
  alias: d
- type: requires_parameter
  target: PARAM-corrosion-allowance
  alias: c
- type: requires_parameter
  target: PARAM-allowable-stress
  alias: S
- type: requires_parameter
  target: PARAM-weld-joint-efficiency
  alias: E
- type: requires_parameter
  target: PARAM-weld-strength-reduction-factor-W
