variables:
  f:
    symbol: f
    description: Stress range factor from eq. (1c)
    unit: dimensionless
  S_c:
    symbol: S_c
    description: Basic allowable stress at minimum metal temperature during displacement
      cycle analysis
    unit: Pa
  S_h:
    symbol: S_h
    description: Basic allowable stress at maximum metal temperature during displacement
      cycle analysis
    unit: Pa
executor: calculate_allowable_displacement_stress_range
calculation_module: eq_1a_allowable_displacement_stress_range.py
outputs:
- symbol: S_A
  name: allowable_displacement_stress_range
  unit: Pa
  type: quantity
equation_id: eq-1a
display: S_A = f * (1.25*S_c + 0.25*S_h)
applies_when: standard allowable displacement stress range calculation
paragraph: 302.3.5(d)
