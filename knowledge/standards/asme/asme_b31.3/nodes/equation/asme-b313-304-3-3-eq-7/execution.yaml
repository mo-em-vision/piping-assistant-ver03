variables:
  d_2:
    symbol: d_2
    description: Half width of reinforcement zone
    unit: mm
  d_1:
    symbol: d_1
    description: Effective length removed from pipe at branch
    unit: mm
  T_h:
    symbol: T_h
    description: Run pipe wall thickness
    unit: mm
  t_h:
    symbol: t_h
    description: Pressure design thickness of run pipe
    unit: mm
  c:
    symbol: c
    description: Corrosion allowance
    unit: mm
outputs:
- symbol: A_2
  name: run_excess_thickness_area
  unit: mm2
  type: quantity
equation_id: eq-7
nomenclature_ref: 304.3.3-a
display: A_2 = (2d_2 - d_1)(T_h - t_h - c)
