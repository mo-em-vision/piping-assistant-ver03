  legacy_equation_id: eq-3a
  last_revision: 2026-07-07
  edited_by: admin
display:
  text: t = PD / 2(SEW + PY)
applicability:
  applies_when:
  - parameter: PARAM-pressure-loading
    operator: equals
    value: internal_pressure
  - parameter: PARAM-straight-pipe-section
    operator: equals
    value: true
  - parameter: PARAM-inside-diameter
    operator: absent
equation_number: 3a
paragraph_number: 304.1.2-a
variables:
  P:
    symbol: P
    description: Internal design gage pressure
    unit: Pa
  D:
    symbol: D
    description: Outside diameter of pipe
    unit: mm
  S:
    symbol: S
    description: Stress value from Table A-1
    unit: Pa
  E:
    symbol: E
    description: Quality factor from Tables A-2 and A-3
    unit: dimensionless
  W:
    symbol: W
    description: Weld strength reduction factor per para. 302.3.5-e
    unit: dimensionless
  Y:
    symbol: Y
    description: Coefficient from Table 304.1.1
    unit: dimensionless
steps:
- name: compute_denominator_terms
  description: Calculate SEW and PY terms
  expressions:
  - expression: S * E * W
    assign: SEW
  - expression: P * Y
    assign: PY
- name: compute_required_thickness
  description: Calculate pressure design wall thickness
  expressions:
  - expression: P * D / (2 * (SEW + PY))
    assign: t
