# Eq. (1c) — Stress Range Factor

```
f = min(6.0*N^(-0.2), f_m)
```

`f_m` is 1.2 for ferrous materials with specified minimum tensile strengths
≤ 517 MPa (75 ksi) at metal temperatures ≤ 371°C (700°F); otherwise `f_m = 1.0`.
