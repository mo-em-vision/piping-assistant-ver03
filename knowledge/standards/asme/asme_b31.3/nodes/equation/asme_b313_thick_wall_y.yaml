# Thick-Wall Coefficient Y

When **t ≥ D/6**, the coefficient **Y** is computed per §304.1.1(b):

```
Y = (d + 2c) / (D + d + 2c)
```

Where **d** is the inside diameter (maximum value allowable under the purchase specification).
