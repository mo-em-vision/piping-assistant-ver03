title: Strength of Branch Connections — Welded Couplings
authority: AUTH-ASME-B31.3
edition: 2024
paragraph_number: 304.3.2-b
text:
  original: >
    (b) the branch connection is made by welding a listed threaded or socket welding
    coupling or listed half coupling directly to the run in accordance with para. 328.5.4,
    provided the size of the branch does not exceed DN 50 (NPS 2) nor one-fourth the
    nominal size of the run. The minimum wall thickness of the coupling anywhere in the
    reinforcement zone (if threads are in the zone, wall thickness is measured from root
    of thread to minimum outside diameter) shall be not less than that of the unthreaded
    branch pipe. In no case shall a coupling or half coupling have a rating less than
    Class 3000 in accordance with ASME B16.11.
