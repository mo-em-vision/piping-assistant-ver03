---
nomenclature:
- symbol: c
  input_id: corrosion_allowance
  introduced_here: true
  unit: mm
  allowed_units:
  - mm
  - in
  description: 'Sum of the mechanical allowances (thread or groove depth) plus corrosion
    and erosion allowances. For threaded components, the nominal thread depth (dimension
    h of ASME B1.20.1, or equivalent) shall apply. For machined surfaces or grooves
    where the tolerance is not specified, the tolerance shall be assumed to be 0.5
    mm (0.02 in.) in addition to the specified depth of the cut.

    '
  defaults:
  - value: 0.5
    unit: mm
    condition: machined surfaces or grooves where tolerance is not specified
    requires_confirmation: true
  citations:
  - standard: ASME B1.20.1
- symbol: D
  input_id: outside_diameter
  introduced_here: true
  description: 'Outside diameter of pipe as listed in tables of standards or specifications
    or as measured.

    '
  unit: mm
  allowed_units:
  - mm
  - in
  resolution:
    method: table_lookup
    keys:
    - nominal_pipe_size
    table: standards/asme/asme_b36.10/tables/B3610-table-2-1.yaml
    node_id: asme_b36.10
  citations:
  - standard: asme_b36.10
    table: tables/B3610-table-2-1.yaml
    field: outside_diameter_mm
- symbol: d
  description: Inside diameter of pipe.
  citations:
  - paragraph: 304.1.1(b)
- symbol: E
  input_id: weld_joint_efficiency
  introduced_here: true
  description: Quality factor from Tables A-2 and A-3.
  resolution:
  - method: table_lookup
    keys:
    - material
    - joint_category
    tables:
    - A-2
    - A-3
  citations:
  - paragraph: 304.1.1(b)
  - table: Table A-2
    table_id: asme_b31.3_A-2
    node_id: B313-table-A-2
  - table: Table A-3
    table_id: asme_b31.3_A-3
    node_id: B313-table-A-3
- symbol: P
  input_id: design_pressure
  introduced_here: true
  description: Internal design gage pressure.
  resolution:
    method: user_input
    required_when_nodes:
    - 304.1.2
  citations:
  - paragraph: 304.1.1(b)
- symbol: S
  input_id: allowable_stress
  introduced_here: true
  description: Stress value from Table A-1.
  citations:
  - paragraph: 304.1.1(b)
  - table: Table A-1
    table_id: asme_b31.3_A-1
    node_id: B313-table-A-1
  - node_id: B313-table-A-1
- symbol: T
  description: 'Pipe wall thickness, manufacturing tolerance considered.

    '
  citations:
  - paragraph: 304.1.1(b)
  - paragraph: 304.1.1(a)
- symbol: t
  description: 'Pressure design thickness, as calculated in accordance with para.
    304.1.2 for internal pressure or as determined in accordance with para. 304.1.3
    for external pressure.

    '
  depends_on:
  - node_id: 304.1.2
    dependency_type: calculation
    when:
      field: pressure_loading
      in:
      - internal_pressure
  - node_id: 304.1.3
    dependency_type: calculation
    when:
      field: pressure_loading
      in:
      - external_pressure
  citations:
  - paragraph: 304.1.1(b)
  - paragraph: 304.1.2
  - paragraph: 304.1.3
  - node_id: 304.1.2
  - node_id: 304.1.3
- symbol: t_m
  description: Minimum required thickness (t + c).
  citations:
  - paragraph: 304.1.1(b)
  - paragraph: 304.1.1(a)
  - equation: asme_b313_304_1_1_eq_2
    node_id: asme_b313_304_1_1_eq_2
- symbol: W
  input_id: weld_joint_strength_reduction_factor_W
  introduced_here: true
  description: Weld strength reduction factor per para. 302.3.5(e).
  resolution:
    method: table_lookup
    keys:
    - material
    - design_temperature
    table_id: asme_b31.3_302.3.5-1
    node_id: B313-table-302-3-5-1
    subsection: e
  citations:
  - paragraph: 304.1.1(b)
  - paragraph: 302.3.5(e)
    node_id: 302.3.5
    subsection: e
- symbol: Y
  input_id: temperature_coefficient_Y
  introduced_here: true
  description: 'Coefficient from Table 304.1.1 when t < D/6 (interpolate for intermediate
    temperatures). When t >= D/6: Y = (d + 2c) / (D + d + 2c).

    '
  resolution:
  - when:
      field: thin_wall
      in:
      - true
    method: table_lookup
    table_id: asme_b31.3_table_304_1_1_1
    keys:
    - material
    - design_temperature
    interpolation: true
  - when:
      field: thin_wall
      in:
      - false
    method: equation
    expression: (d + 2*c) / (D + d + 2*c)
    file: ../equation/asme_b313_thick_wall_y.yaml
  citations:
  - paragraph: 304.1.1(b)
  - table: Table 304.1.1-1
    table_id: asme_b31.3_table_304_1_1_1
    node_id: B313-table-304-1-1-1
---
