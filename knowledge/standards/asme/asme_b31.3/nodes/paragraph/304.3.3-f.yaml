paragraph_number: 304.3.3-f
text:
  original: >
    (f) Added Reinforcement.

    (1) Reinforcement added in the form of a ring or saddle as part of area A_4 shall
    be of reasonably constant width.

    (2) Material used for reinforcement may differ from that of the run pipe provided
    it is compatible with run and branch pipes with respect to weldability, heat
    treatment requirements, galvanic corrosion, thermal expansion, etc.

    (3) If the allowable stress for the reinforcement material is less than that for
    the run pipe, its calculated area shall be reduced in the ratio of allowable stress
    values in determining its contribution to area A_4.

    (4) No additional credit may be taken for a material having higher allowable stress
    value than the run pipe.
