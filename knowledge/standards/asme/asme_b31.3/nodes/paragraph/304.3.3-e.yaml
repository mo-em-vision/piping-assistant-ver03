title: Reinforcement of Welded Branch Connections — Multiple Branches
authority: AUTH-ASME-B31.3
edition: 2024
paragraph_number: 304.3.3-e
text:
  original: >
    (e) Multiple Branches. When two or more branch connections are so closely spaced
    that their reinforcement zones overlap, the distance between centers of the
    openings should be at least 1-1/2 times their average diameter, and the area of
    reinforcement between any two openings shall be not less than 50% of the total that
    both require. Each opening shall have adequate reinforcement in accordance with
    (b) and (c). No part of the metal cross section may apply to more than one opening
    or be evaluated more than once in any combined area. (Consult PFI Standard ES-7,
    Minimum Length and Spacing for Branch Connections, for detailed recommendations on
    spacing of welded nozzles.)
