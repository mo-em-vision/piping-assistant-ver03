paragraph_number: 302.3.3-b
text:
  original: >
    (b) Basic Quality Factors. Castings of gray and malleable iron, conforming to listed
    specifications, are assigned a basic casting quality factor, E_c, of 1.00 (due to
    their conservative allowable stress basis). For most other metals, static castings
    that conform to the material specification and have been visually examined as
    required by MSS SP-55, Quality Standard for Steel Castings for Valves, Flanges and
    Fittings and Other Piping Components — Visual Method, are assigned a basic casting
    quality factor, E_c, of 0.80. Centrifugal castings that meet specification
    requirements only for chemical analysis, tensile, hydrostatic, and flattening tests,
    and visual examination are assigned a basic casting quality factor of 0.80. Basic
    casting quality factors are tabulated for listed specifications in Table A-2.
