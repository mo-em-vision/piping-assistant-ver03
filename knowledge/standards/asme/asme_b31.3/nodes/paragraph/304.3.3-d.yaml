text:
  original: >
    (d) Reinforcement Zone. The reinforcement zone is a parallelogram whose length
    extends a distance, d_2, on each side of the centerline of the branch pipe and whose
    width starts at the inside surface of the run pipe (in its corroded condition) and
    extends beyond the outside surface of the run pipe a perpendicular distance, L_4.
