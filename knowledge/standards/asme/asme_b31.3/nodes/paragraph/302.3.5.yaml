# Limits of Calculated Stresses Due to Sustained Loads and Displacement Strains 


**a) Internal Pressure Stresses.** Stresses due to internal pressure shall be considered safe when the wall thickness of the piping component, including any reinforcement, meets the requirements of para. 304.

**b) External Pressure Stresses.** Stresses due to external pressure shall be considered safe when the wall thickness of the piping component, and its means of stiffening,
meet the requirements of para. 304.

**c) Stresses Due to Sustained Loads, S_L**. The sum of the longitudinal stresses due to sustained loads, S_L, e.g., the pressure and weight in any component in a piping system (see para. 320), shall not exceed S_h, where S_h is taken from Table A-1 at the metal temperature of the operating condition being considered.

**d) Allowable Displacement Stress Range, S_A.** The computed displacement stress range, S_E, in a piping system (see para. 319.4.4) shall not exceed the allowable displacement stress range, S_A (see paras. 319.2.3 and 319.3.4), calculated by equation (1a): S_A= f*(1.25*S_c + 0.25*S_h) When S_h is greater than S_L, the difference between them may be added to the term 0.25*S_h in the previous equation (1a). In that case, the allowable stress range is calculated by equation (1b): S_A= f *(1.25*(S_c + S_h) − S_L).
For equations. (1a) and (1b): 
	**f:** stress range factor,  calculated by eq. (1c): f=6.0*(N)^(-0.2) <= f_m
	**f_m:** maximum value of stress range factor; 1.2 for ferrous materials with specified minimum tensile strengths ≤ 517 MPa (75 ksi) and at metal temperatures ≤ 371°C (700°F); otherwise f_m = 1.0.
	**N:** equivalent number of full displacement cycles during the expected service life of the piping system.
	**S_c:** basic allowable stress at minimum metal temperature expected during the displacement cycle under analysis (= 138 MPa (20 ksi) maximum) 
	**S_h:** basic allowable stress at maximum metal temperature expected during the displacement cycle under analysis (=138 MPa (20 ksi) maximum)
	**S_L:** stress due to sustained loads; in systems where supports may be active in some conditions and inactive in others, the maximum value of sustained stress, considering all support conditions, shall be used.

When the computed stress range varies, whether from thermal expansion or other conditions, S_E is defined as the greatest computed displacement stress range. The
value of N in such cases can be calculated by eq. (1d): N =N_E + sum(r_i^5*N_i) for i =1, 2, . . ., n

where: 
- **N_E**: number of cycles of maximum computed displacement
stress range, S_E
- **N_i:** number of cycles associated with displacement
stress range, S_i
- **r_i** = S_i/S_E
- **S_i**: any computed displacement stress range smaller than S_E

**e) Weld Joint Strength Reduction Factor,W.** At elevated temperatures, the long-term strength of weld joints may be lower than the long-term strength of the base material. For longitudinal or spiral (helical seam) welded piping components, the product of the allowable stress and the applicable weld quality factor, S_E, shall be
multiplied by the weld joint strength reduction factor, W, when determining the required wall thickness for internal pressure in accordance with para. 304. The
designer is responsible for the application of weld joint strength reduction factors to welds other than longitudinal and spiral (helical seam) (e.g., circumferential). The weld joint strength reduction factor, W, is equal to 1.0 when evaluating occasional loads such as wind and earthquake, or when evaluating permissible variations in accordance with para. 302.2.4. The pressure rating or allowable stress for the occasional load or variation condition is not required to be reduced by the weld joint
strength reduction factor. It is also not required when calculating the allowable stress range for displacement stresses, S_A, in para. 302.3.5(d). The weld joint strength
reduction factor only applies at weld locations. The weld joint strength reduction factor is the ratio of the nominal stress to cause failure of the weld joint to that of the
base material for the same duration. Except as provided in (f) below, the weld joint strength reduction factor, W, shall be in accordance with Table 302.3.5.

**f) Unlisted Weld Strength Reduction Factors.** A weld strength reduction factor other than that listed in Table 302.3.5 may be used in accordance with one of the following criteria:
	1) Creep test data may be used to determine the weld joint strength reduction factor, W. However, the use of creep test data to increase the factor W above that shown in Table 302.3.5 is not permitted for the CrMo and Creep Strength Enhanced Ferritic (CSEF) steels materials, as defined in Table 302.3.5. Creep testing of weld joints to determine weld joint strength reduction factors, when permitted, should be full thickness cross weld specimens with test durations of at least 1000 hours. Full thickness tests shall be used unless the designer otherwise considers effects such as stress redistribution across the weld.
2) With the owner’s approval, extensive successful experience may be used to justify the factor W above that shown in Table 302.3.5. Successful experience must include same or like material, weld metal composition, and welding process under equivalent, or more severe, sustained operating conditions.
