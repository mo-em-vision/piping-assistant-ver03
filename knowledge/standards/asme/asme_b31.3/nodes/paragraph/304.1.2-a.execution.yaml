conditions:
  - id: thin_wall_check
    name: Thin-Wall Applicability
    expression: t < D/6
    description: >
      Post-evaluation check that calculated pressure design thickness t satisfies
      the thin-wall applicability limit per §304.1.2(a).
    sets_field: thin_wall
    on_false: subsection_b
    result_if_true: §304.1.2(a) thin-wall equation remains applicable
    result_if_false: t >= D/6 — refer to §304.1.2(b) thick-wall consideration
provisional_assumptions:
  - field: thin_wall
    default: true
    description: Assume t < D/6 until thickness is calculated and verified.
subsections:
  - id: b
    label: Thick wall special consideration
    status: not_implemented
