text:
  original: >
    Straight Pipe Under External Pressure.

    To determine wall thickness and stiffening requirements for straight pipe under
    external pressure, the procedure outlined in the BPV Code, Section VIII, Division
    1, UG-28 through UG-30 shall be followed, using as the design length, L, the
    running centerline length between any two sections stiffened in accordance with
    UG-29. As an exception, for pipe with D_o/t < 10, the value of S to be used in
    determining Pa2 shall be the lesser of the following values for pipe material at
    design temperature:

    a) 1.5 times the stress value from Table A-1 or Table A-1M of this Code, or

    b) 0.9 times the yield strength tabulated in Section II, Part D, Table Y-1 for
    materials listed therein (The symbol D_o in Section VIII is equivalent to D in
    this Code.)
