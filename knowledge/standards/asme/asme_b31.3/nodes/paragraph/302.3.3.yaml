# 302.3.3 Casting Quality Factor, Ec

**a) General**. The casting quality factors, E_c, defined herein shall be used for cast components not having pressure–temperature ratings established by standards in Table 326.1.

**b) Basic Quality Factors**. Castings of gray and malleable iron, conforming to listed specifications, are assigned a basic casting quality factor, E_c, of 1.00 (due to their conservative allowable stress basis). For most other metals, static castings that conform to the material specification and have been visually examined as required by MSS SP-55, Quality Standard for Steel Castings for Valves, Flanges and Fittings and Other Piping Components — Visual Method, are assigned a basic casting quality factor, E_c, of 0.80. Centrifugal castings that meet specification requirements only for chemical analysis, tensile, hydrostatic, and flattening tests, and visual examination are assigned a basic casting quality factor of 0.80. Basic casting quality factors are tabulated for listed specifications in [Table A-2](table:asme_b31.3_A-2).

**c) Increased Quality Factors.** Casting quality factors may be increased when supplementary examinations are performed on each casting. [Table 302.3.3C](table:asme_b31.3_table_302_3_3C) states the increased casting quality factors, E_c, that may be used for various combinations of supplementary examination. Table 302.3.3D states the acceptance criteria for the examination methods specified in the [Notes to Table 302.3.3C](node:B313-table-302-3-3C). Quality factors higher than those shown in Table 302.3.3C do not result from combining tests [(2)(a)](node:B313-note-302-3-3C-2a) and [(2)(b)](node:B313-note-302-3-3C-2b), or [(3)(a)](node:B313-note-302-3-3C-3a) and [(3)(b)](node:B313-note-302-3-3C-3b). In no case shall the quality factor exceed 1.00.

Several of the specifications in Appendix A require machining of all surfaces and/or one or more of these supplementary examinations. In such cases, the appropriate increased quality factor is shown in [Table A-2](table:asme_b31.3_A-2).
