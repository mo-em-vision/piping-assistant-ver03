interactions:
- variable: d_input_mode
  mode: decision
  options:
  - nps_lookup
  - direct_od
  default: nps_lookup
  required: true
  confirmation_required: false
  question: 'Provide outside diameter D by nominal pipe size (NPS, looked up per ASME
    B36.10) or enter the outside diameter directly (mm or in)?

    '
- variable: joint_category
  mode: decision
  options:
  - seamless
  - erw
  - furnace_butt_welded
  - forging
  default: seamless
  required: true
  confirmation_required: true
  question: 'Confirm the pipe/joint category for quality factor E lookup (Tables A-2
    and A-3). Default is seamless pipe.

    '
provisional_assumptions:
- field: thin_wall
  default: true
  description: Assume t < D/6 until thickness is calculated.
inputs:
- id: design_pressure
  name: P
  description: Internal design gage pressure
  nomenclature_ref: 304.1.1
  required: true
  source: user_input
  unit: Pa
  allowed_units:
  - Pa
  - bar
  - psi
  validation: positive
  requires_confirmation: false
- id: nominal_pipe_size
  name: NPS
  description: Nominal pipe size for outside diameter lookup per ASME B36.10
  nomenclature_ref: 304.1.1
  required: true
  source: user_input
  unit: dimensionless
  validation: non_empty
  requires_confirmation: false
  when:
    field: d_input_mode
    in:
    - nps_lookup
- id: outside_diameter
  name: D
  description: Outside diameter of pipe as measured
  nomenclature_ref: 304.1.1
  required: true
  source: user_input
  unit: mm
  allowed_units:
  - mm
  - in
  validation: positive
  requires_confirmation: false
  when:
    field: d_input_mode
    in:
    - direct_od
- id: corrosion_allowance
  name: c
  description: Sum of mechanical allowances per ?304.1.1(b)
  nomenclature_ref: 304.1.1
  required: false
  source: default
  unit: mm
  allowed_units:
  - mm
  - in
  requires_confirmation: true
- id: allowable_stress
  name: S
  description: Stress value from Table A-1 at design temperature
  nomenclature_ref: 304.1.1
  required: true
  source: node_output
  unit: Pa
  allowed_units:
  - Pa
  - psi
  validation: positive
  requires_confirmation: false
- id: weld_joint_efficiency
  name: E
  description: Quality factor from Tables A-2 and A-3
  nomenclature_ref: 304.1.1
  required: true
  source: default
  unit: dimensionless
  default: 1.0
  requires_confirmation: true
- id: joint_category
  name: joint_category
  description: Pipe or joint category for E lookup in Tables A-2 and A-3
  nomenclature_ref: 304.1.1
  required: false
  source: user_input
  unit: dimensionless
  validation: non_empty
  requires_confirmation: false
- id: weld_joint_strength_reduction_factor_W
  name: W
  description: Weld strength reduction factor per para. 302.3.5(e)
  nomenclature_ref: 304.1.1
  required: true
  source: default
  unit: dimensionless
  default: 1.0
  requires_confirmation: true
- id: temperature_coefficient_Y
  name: Y
  description: Coefficient from Table 304.1.1 (t < D/6) or thick-wall equation
  nomenclature_ref: 304.1.1
  required: true
  source: resolved
  unit: dimensionless
  default: 0.4
  requires_confirmation: true
equations:
- id: asme_b313_304_1_2_wall_thickness
  file: ../equation/asme_b313_304_1_2_wall_thickness.yaml
  execution_function: calculate_wall_thickness
- id: asme_b313_mawp_pressure
  file: ../equation/asme_b313_mawp_pressure.yaml
  execution_function: calculate_mawp
- id: asme_b313_thick_wall_y
  file: ../equation/asme_b313_thick_wall_y.yaml
conditions:
- type: text
  kind: condition
  id: thin_wall_check
  source: "---\nid: thin_wall_check\nname: thin_wall_check\nexpression: \"t < D/6\"\
    \ndescription: >\n  Determine whether the thin-wall pressure design equation in\
    \ §304.1.2\n  is applicable for the calculated thickness and outside diameter.\n\
    \ninputs:\n  - symbol: t\n    source: node_output\n    description: Calculated\
    \ pressure design thickness from wall_thickness equation\n  - symbol: D\n    source:\
    \ user_input\n    description: Outside diameter of pipe\n\nresult_if_true:\n \
    \ decision: use_thin_wall_equation\n  action: Continue with equations/wall_thickness.md\
    \ result\n\nresult_if_false:\n  decision: use_thick_wall_equation\n  action: Route\
    \ to thick-wall pressure design node (not yet implemented)\n\ntrace:\n  capture:\n\
    \    - expression\n    - inputs\n    - result\n    - decision\n---\n\n# Thin-Wall\
    \ Applicability Check\n\n## Condition\n\n```\nt < D/6\n```\n\n## Engineering meaning\n\
    \nWhen the calculated pressure design thickness satisfies the thin-wall criterion,\
    \ the pressure design equation referenced by §304.1.2 is applicable.\n\nWhen the\
    \ criterion is not satisfied, thick-wall provisions apply and this node's thin-wall\
    \ equation result must not be used as the final design thickness without further\
    \ evaluation.\n\n## Evaluation order\n\n1. Calculate provisional `t` using `equations/wall_thickness.md`.\n\
    2. Evaluate `t < D/6`.\n3. Record the decision in the execution trace and report.\n"
kind: calculation
notes:
- id: corrosion_allowance
  text: 'Pressure design thickness t from this node must be combined with allowances
    c per ?304.1.1 eq. (2) to obtain t_m.

    '
- id: mill_tolerance
  text: 'Selected pipe wall thickness T must be not less than t_m per ?304.1.1(a),
    considering manufacturer''s minus tolerance.

    '
- id: corrosion_and_ordered_thickness
  type: text
  source: "---\nid: corrosion_and_ordered_thickness\ntext: >\n  Pressure design thickness\
    \ t from §304.1.2 must be combined with allowances c\n  per §304.1.1 eq. (2) to\
    \ obtain t_m. Selected thickness T must be not less\n  than t_m, considering manufacturer's\
    \ minus tolerance.\n---\n\n# Corrosion and Ordered Thickness\n\nThe calculated\
    \ value `t` from this node is **pressure design thickness**, not the ordered pipe\
    \ wall thickness.\n\nApply §304.1.1 eq. (2) to obtain `t_m = t + c`, then select\
    \ pipe with wall thickness `T` not less than `t_m`.\n"
