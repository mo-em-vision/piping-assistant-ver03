paragraph_number: 304.3.1-b
text:
  original: >
    (b) The rules in paras. 304.3.2 through 304.3.4 are minimum requirements, valid only
    for branch connections in which (using the nomenclature of Figure 304.3.3-1):

    (1) the run pipe diameter-to-thickness ratio (D_h/T_h) is less than 100 and the
    branch-to-run diameter ratio (D_b/D_h) is not greater than 1.0

    (2) for run pipe with D_h/T_h ≥ 100, the branch diameter, D_b, is less than one-half
    the run diameter, D_h

    (3) angle β is at least 45 deg

    (4) the axis of the branch intersects the axis of the run
