title: Reinforcement of Welded Branch Connections — Available Area
authority: AUTH-ASME-B31.3
edition: 2024
paragraph_number: 304.3.3-c
text:
  original: >
    (c) Available Area. The area available for reinforcement is defined as: A_2 + A_3
    + A_4 ≥ A_1 ... eq. (6a). These areas are all within the reinforcement zone and are
    further defined below.

    (1) Area A_2 is the area resulting from excess thickness in the run pipe wall:
    A_2 = (2d_2 - d_1)(T_h - t_h - c) ... eq. (7).

    (2) Area A_3 is the area resulting from excess thickness in the branch pipe wall:
    A_3 = 2L_4(T_b - t_b - c)/sin(β) ... eq. (8). If the allowable stress for the
    branch pipe wall is less than that for the run pipe, its calculated area shall be
    reduced in the ratio of allowable stress values of the branch to the run in
    determining its contributions to area A_3.

    (3) Area A_4 is the area of other metal provided by welds and properly attached
    reinforcement (see (f)). Weld areas shall be based on the minimum dimensions
    specified in para. 328.5.4, except that larger dimensions may be used if the welder
    has been specifically instructed to make the welds to those dimensions.
