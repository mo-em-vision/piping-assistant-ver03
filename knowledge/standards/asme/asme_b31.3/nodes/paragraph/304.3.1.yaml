title: General — Branch Connections Scope
authority: AUTH-ASME-B31.3
edition: 2024
paragraph_number: 304.3.1
text:
  original: >
    Except as provided in (b) below, the requirements in paras. 304.3.2 through 304.3.4
    are applicable to the following branch connections:

    (1) fittings (tees, extruded outlets, branch outlet fittings in accordance with MSS
    SP-97, laterals, crosses)

    (2) couplings not larger than DN 80 (NPS 3) and unlisted cast or forged branch
    connection fittings (see para. 300.2) attached to the run pipe by welding

    (3) welding the branch pipe directly to the run pipe (set-in or set-on), with or
    without added reinforcement, as covered in para. 328.5.4
