text:
  original: >
    (c) Stresses Due to Sustained Loads, S_L. The sum of the longitudinal stresses due
    to sustained loads, S_L, e.g., the pressure and weight in any component in a piping
    system (see para. 320), shall not exceed S_h, where S_h is taken from Table A-1 at
    the metal temperature of the operating condition being considered.
