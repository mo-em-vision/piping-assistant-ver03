paragraph_number: 302.3.5-f
text:
  original: >
    (f) Unlisted Weld Strength Reduction Factors. A weld strength reduction factor other
    than that listed in Table 302.3.5 may be used in accordance with one of the following
    criteria:

    1) Creep test data may be used to determine the weld joint strength reduction factor,
    W. However, the use of creep test data to increase the factor W above that shown in
    Table 302.3.5 is not permitted for the CrMo and Creep Strength Enhanced Ferritic
    (CSEF) steels materials, as defined in Table 302.3.5. Creep testing of weld joints to
    determine weld joint strength reduction factors, when permitted, should be full
    thickness cross weld specimens with test durations of at least 1000 hours. Full
    thickness tests shall be used unless the designer otherwise considers effects such as
    stress redistribution across the weld.

    2) With the owner's approval, extensive successful experience may be used to justify
    the factor W above that shown in Table 302.3.5. Successful experience must include
    same or like material, weld metal composition, and welding process under equivalent,
    or more severe, sustained operating conditions.
