# ASME B31.3 §304.3.2 — Strength of Branch Connections

## Paragraph Text

A pipe having a branch connection is weakened by the opening made in it and, unless the wall thickness of the pipe is sufficiently in excess of that required to sustain the pressure, it is necessary to provide added reinforcement.

The amount of reinforcement required to sustain the pressure shall be determined in accordance with para. [304.3.3](node:304.3.3) or [para. 304.3.4](node:304.3.4). There are, however, certain branch connections that have adequate pressure strength or reinforcement as constructed. It may be assumed without calculation that a branch connection has adequate strength to sustain the internal and external pressure that will be applied to it if

**(a)** the branch connection is made with a listed branch type fitting such as an ASME B16.9 or ASME B16.11 tee, or MSS SP-97 branch connection fitting. See para. [303](node:303).

**(b)** the branch connection is made by welding a listed threaded or socket welding coupling or listed half coupling directly to the run in accordance with para. [328.5.4](node:328.5.4), provided the size of the branch does not exceed DN 50 (NPS 2) nor one-fourth the nominal size of the run. The minimum wall thickness of the coupling anywhere in the reinforcement zone (if threads are in the zone, wall thickness is measured from root of thread to minimum outside diameter) shall be not less than that of the unthreaded branch pipe. In no case shall a coupling or half coupling have a rating less than Class 3000 in accordance with ASME B16.11.

**(c)** the branch connection utilizes an unlisted branch connection fitting (see para. [300.2](node:300.2)), provided the fitting is made from materials listed in [Table A-1](table:asme_b31.3_A-1) (Table A-1C) and provided that the branch connection is qualified as required by para. [304.7.2](node:304.7.2).

---

# Engineering Explanation

This node separates branch connections that are inherently adequate from those requiring explicit reinforcement area calculation. When no exception in (a)–(c) applies, proceed to §304.3.3 for welded branch reinforcement or §304.3.4 for other branch types.

---

# Decision Logic

This node applies when:

- A branch connection is subject to internal or external pressure design under §304.3.

Reinforcement calculation is required when:

- Run pipe wall thickness is not sufficiently in excess of pressure design thickness, and
- None of the assumed-adequate cases in (a)–(c) apply.

Calculation may be omitted when:

- A listed fitting or qualifying coupling arrangement in (a) or (b) is used, or
- An unlisted fitting in (c) is qualified per §304.7.2.
