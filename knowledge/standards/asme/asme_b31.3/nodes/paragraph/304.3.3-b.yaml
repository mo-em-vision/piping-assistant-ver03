text:
  original: >
    (b) Required Reinforcement Area. The reinforcement area, A_1, required for a branch
    connection under internal pressure is: A_1 = t_h d_1 (2 sin β) ... eq. (6). For a
    branch connection under external pressure, area A_1 is one-half the area calculated
    by eq. (6), using as t_h the thickness required for external pressure.
