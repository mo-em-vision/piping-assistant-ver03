title: Internal Pressure Design — Thin Wall

authority: AUTH-ASME-B31.3

edition: 2024

paragraph_number: 304.1.2-a

text:

  original: >

    (a) For t < D/6, the internal pressure design thickness for straight pipe shall

    be not less than that calculated in accordance with either equation (3a) or equation

    (3b):



    t = PD / 2(SEW + PY)   ... eq. (3a)



    t = P(d+2c) / 2(SEW - P(1-Y))   ... eq. (3b)

