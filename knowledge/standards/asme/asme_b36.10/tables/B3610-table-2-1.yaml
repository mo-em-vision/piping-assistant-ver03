standard: asme_b36.10
node_id: B3610-table-2-1
registry:
  pack: asme_b36.10
  yaml: tables/B3610-table-2-1.yaml
  db_file: pipe_dimensions.db
  table_id: table-2-1
# Development sample — structured per ASME B36.10M welded/seamless wrought steel pipe.
# Outside diameter is identical for all schedules at a given NPS.
# Wall thickness and plain-end weight vary by schedule.

table_id: table-2-1
title: Dimensions and Weights (Masses) of Welded and Seamless Wrought Steel Pipe
publish_date: 2018
unit_system: imperial

option_queries:
  nps_values:
    storage: pipe_dimensions
    value_column: nps
    label_template: "NPS {value}"
    order_by: outside_diameter_mm
  schedules_for_nps:
    storage: pipe_dimensions
    requires: [nominal_pipe_size]
    value_column: schedule
    label_template: "Schedule {value} ({wall_thickness_mm:g} mm / {wall_thickness_in:g} in)"
    filter:
      nominal_pipe_size: nps
  nps_od_values:
    storage: pipe_dimensions
    value_column: outside_diameter_mm
    label_template: "{outside_diameter_in:g} in ({outside_diameter_mm:g} mm)"
    order_by: outside_diameter_mm

keys:
  - nominal_pipe_size
  - schedule

aliases:
  nps:
    '1/2"': "1/2"
    '1/2 in': "1/2"
    '0.5': "1/2"
    '2"': "2"
    '2 in': "2"
    '2 inch': "2"
    'NPS 2': "2"
    'NPS 4': "4"
    '4"': "4"
  schedule:
    STD: "40"
    STANDARD: "40"
    XS: "80"
    XSTR: "80"
    XXS: "XXS"

