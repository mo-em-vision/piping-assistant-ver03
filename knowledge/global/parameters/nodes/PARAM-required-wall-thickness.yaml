description: >
  Pressure design thickness (symbol t) per §304.1.2. On a design-pressure path
  this is the required minimum thickness calculated from eq. (3a) or (3b). On a
  MAWP path this is the available pressure design thickness derived from actual
  or nominal wall thickness minus applicable allowances (t = t_actual - c).
